name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # ⚠️ Change this to "master" if your primary branch is called master

# This is the magic snippet that stops the collisions and queue freezes
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (perfect for vanilla HTML/JS/CSS)
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5